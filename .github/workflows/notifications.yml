name: Send Task Notifications
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification cron
        run: |
          URL="${{ secrets.APP_URL }}"
          if [[ ! $URL =~ ^https?:// ]]; then URL="https://$URL"; fi
          URL="${URL%/}"
          RESPONSE=$(curl -s -L -o /tmp/cron_response.json -w "%{http_code}" \
            -X GET "$URL/api/cron/notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/cron_response.json
          if [ "$RESPONSE" != "200" ]; then exit 1; fi
