name: Send Task Notifications

on:
  schedule:
    # Runs every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification cron
        run: |
          RESPONSE=$(curl -s -o /tmp/cron_response.json -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/cron_response.json
          
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Notification cron failed with status $RESPONSE"
            exit 1
          fi
          
          SENT=$(cat /tmp/cron_response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('sentCount', 0))")
          echo "✅ Notifications sent: $SENT"
